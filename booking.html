<!DOCTYPE html>
<html lang="en">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Bean & Brew Café | Quality Coffee & Fresh Food in a Relaxed Setting</title>
		<meta name="description" content="Visit Bean & Brew Café for freshly ground coffee, artisan sandwiches, and a welcoming atmosphere. The perfect local spot for remote working or meeting friends.">

		<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
		<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
		<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
		<link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico">
		<link rel="manifest" href="assets/favicon/site.webmanifest">

		<link href="css/reset.css" rel="stylesheet">
		<link href="css/tokens.css" rel="stylesheet">
		<link href="css/base.css" rel="stylesheet">
		<link href="css/pages/booking.css" rel="stylesheet">
		<link href="css/navbar.css" rel="stylesheet">
		<link href="css/footer.css" rel="stylesheet">
	</head>

	<body>
		<div id="header"></div>

		<main>

			<div class="picture">
				<img src="assets/images/booking.png" alt="Interior view of the cafe showing available tables for booking">
			</div>
			<div class="form-wraper">

				<form>
					<h1>Reserve a Table</h1>

					<div>
						<label for="name">Full name</label>
						<input type="text" id="name" name="name" required>

						<label for="email">E-mail</label>
						<input type="email" id="email" name="email" required>

						<label for="guest">Number of guest</label>
						<input type="number" id="guest" name="guest" min="1" max="20" required>

						<label for="bookdate">Select date</label>
						<input type="date" id="bookdate" name="bookdate" value="" required>

						<label for="booktime">Select time</label>
						<input type="time" id="booktime" name="booktime" min="09:00" max="20:00" step="60" required>
					</div>

					<button class="booking-btn" type="submit">Submit</button>
				</form>
			</div>
		</main>

		<div id="footer"></div>
		<script type="module" src="js/app.js"></script>
		<script type="module" src="js/navbar.js"></script>
	</body>
</html>
